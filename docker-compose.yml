# Local development services — PostgreSQL + Redis
# No password required for local development (trust auth)
# Run: docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitquest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitquest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  redis:
    image: redis:7-alpine
    container_name: fitquest-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
